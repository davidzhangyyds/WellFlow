<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WellFlow — New Habit</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .page-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.8rem;
    }
    .back-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.18s;
      text-decoration: none;
      flex-shrink: 0;
    }
    .back-btn:hover { background: rgba(255,255,255,0.06); color: var(--text-primary); }

    .page-title { font-family: var(--font-display); font-size: 1.4rem; font-weight: 800; }

    .form-section { margin-bottom: 1.6rem; }
    .form-section-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    /* ── Emoji preview in task name ── */
    .task-name-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .task-emoji-preview {
      position: absolute;
      left: 14px;
      font-size: 1.1rem;
      pointer-events: none;
    }
    .task-name-input { padding-left: 42px !important; }

    /* ── Time input ── */
    input[type="time"] {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 0.95rem;
      padding: 12px 14px 12px 42px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      appearance: none;
    }
    input[type="time"]:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(0,230,118,0.08);
    }
    input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.5); cursor: pointer; }

    /* ── Description textarea ── */
    textarea {
      resize: vertical;
      min-height: 80px;
      padding: 12px 14px !important;
    }

    .submit-area { margin-top: 2rem; }

    .preview-card {
      background: rgba(0,230,118,0.04);
      border: 1px solid rgba(0,230,118,0.15);
      border-radius: var(--radius-md);
      padding: 1rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1rem;
    }
    .preview-icon { font-size: 1.8rem; }
    .preview-details { flex: 1; }
    .preview-title { font-weight: 600; font-size: 0.95rem; }
    .preview-sub   { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }

    .error-msg {
      color: #ff8080;
      font-size: 0.82rem;
      margin-top: 6px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="app-shell">

    <!-- Nav bar -->
    <nav class="nav-bar">
      <div class="brand-name" style="font-size:1.3rem;">Well<span>Flow</span></div>
      <div class="nav-actions">
        <a href="profile.html"><div class="avatar" id="nav-avatar">?</div></a>
      </div>
    </nav>

    <main class="content">

      <!-- Header -->
      <div class="page-header anim-1">
        <a href="dashboard.html" class="back-btn">←</a>
        <div class="page-title">New Habit</div>
      </div>

      <!-- Form -->
      <form id="habit-form" novalidate>

        <!-- Task name -->
        <div class="form-section anim-2">
          <div class="form-section-title">Task Name</div>
          <div class="task-name-wrap">
            <span class="task-emoji-preview" id="emoji-preview">📌</span>
            <input type="text" id="task-title" class="task-name-input"
              placeholder="e.g. Evening Yoga" autocomplete="off" oninput="updatePreview()" />
          </div>
          <div class="error-msg" id="err-title">Please enter a task name.</div>
        </div>

        <!-- Category -->
        <div class="form-section anim-3">
          <div class="form-section-title">Category</div>
          <div class="category-grid" id="category-grid">
            <div class="cat-chip selected" data-cat="sport" data-icon="🏃" onclick="selectCat(this)">
              <span class="cat-emoji">🏃</span>Sport
            </div>
            <div class="cat-chip" data-cat="mental" data-icon="🧘" onclick="selectCat(this)">
              <span class="cat-emoji">🧘</span>Mental
            </div>
            <div class="cat-chip" data-cat="hydration" data-icon="💧" onclick="selectCat(this)">
              <span class="cat-emoji">💧</span>Hydration
            </div>
            <div class="cat-chip" data-cat="sleep" data-icon="😴" onclick="selectCat(this)">
              <span class="cat-emoji">😴</span>Sleep
            </div>
            <div class="cat-chip" data-cat="nutrition" data-icon="🥗" onclick="selectCat(this)">
              <span class="cat-emoji">🥗</span>Nutrition
            </div>
            <div class="cat-chip" data-cat="break" data-icon="📵" onclick="selectCat(this)">
              <span class="cat-emoji">📵</span>Break
            </div>
          </div>
        </div>

        <!-- Time -->
        <div class="form-section anim-4">
          <div class="form-section-title">Scheduled Time</div>
          <div class="input-wrap">
            <span class="icon">⏰</span>
            <input type="time" id="task-time" value="08:00" oninput="updatePreview()" />
          </div>
        </div>

        <!-- Description (optional) -->
        <div class="form-section anim-4">
          <div class="form-section-title">Description <span style="color:var(--text-faint);font-size:.7rem;letter-spacing:0">(optional)</span></div>
          <div class="input-wrap">
            <span class="icon" style="top:14px;align-self:flex-start;">📝</span>
            <textarea id="task-desc" class="no-icon" style="padding-left:42px;"
              placeholder="Notes, duration, frequency…" oninput="updatePreview()"></textarea>
          </div>
        </div>

        <!-- Initial status -->
        <div class="form-section anim-5">
          <div class="form-section-title">Initial Status</div>
          <div class="status-toggle">
            <button type="button" class="status-btn active-todo" data-status="todo" onclick="selectStatus(this)">To Do</button>
            <button type="button" class="status-btn" data-status="doing" onclick="selectStatus(this)">Doing</button>
            <button type="button" class="status-btn" data-status="done" onclick="selectStatus(this)">Done</button>
          </div>
        </div>

        <!-- Live preview -->
        <div class="form-section anim-5">
          <div class="form-section-title">Preview</div>
          <div class="preview-card">
            <div class="preview-icon" id="prev-icon">🏃</div>
            <div class="preview-details">
              <div class="preview-title" id="prev-title">Your habit name</div>
              <div class="preview-sub" id="prev-sub">08:00</div>
            </div>
            <span class="badge badge-todo" id="prev-badge">To Do</span>
          </div>
        </div>

        <!-- Submit -->
        <div class="submit-area anim-6">
          <button type="button" class="btn btn-primary btn-full" onclick="submitHabit()">
            + Add Habit
          </button>
        </div>

      </form>
    </main>

    <!-- Tab bar -->
    <nav class="tab-bar">
      <a href="dashboard.html" class="tab-item">
        <span class="tab-icon">🏠</span>Home
      </a>
      <a href="habits.html" class="tab-item">
        <span class="tab-icon">📋</span>Habits
      </a>
      <a href="new-habit.html" class="tab-item active">
        <span class="tab-icon">➕</span>Add
      </a>
      <a href="profile.html" class="tab-item">
        <span class="tab-icon">👤</span>Profile
      </a>
    </nav>
  </div>

  <script src="app.js"></script>
  <script>
    Auth.require();

    const user = Auth.get();
    document.getElementById('nav-avatar').textContent = (user?.username || 'U').charAt(0).toUpperCase();

    let selectedCat    = 'sport';
    let selectedIcon   = '🏃';
    let selectedStatus = 'todo';

    function selectCat(el) {
      document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
      selectedCat  = el.dataset.cat;
      selectedIcon = el.dataset.icon;
      document.getElementById('emoji-preview').textContent = selectedIcon;
      updatePreview();
    }

    function selectStatus(btn) {
      document.querySelectorAll('.status-btn').forEach(b => {
        b.className = 'status-btn';
      });
      selectedStatus = btn.dataset.status;
      btn.classList.add('active-' + selectedStatus);
      updatePreview();
    }

    function updatePreview() {
      const title = document.getElementById('task-title').value.trim() || 'Your habit name';
      const time  = document.getElementById('task-time').value || '08:00';
      const desc  = document.getElementById('task-desc').value.trim();

      document.getElementById('prev-icon').textContent  = selectedIcon;
      document.getElementById('prev-title').textContent = title;
      document.getElementById('prev-sub').textContent   = desc ? `${time} · ${desc.substring(0,30)}` : time;

      const badgeMap = {
        todo:  ['badge-todo',  'To Do'],
        doing: ['badge-doing', 'Doing'],
        done:  ['badge-done',  '✓ Done'],
      };
      const [cls, label] = badgeMap[selectedStatus];
      const badge = document.getElementById('prev-badge');
      badge.className = 'badge ' + cls;
      badge.textContent = label;
    }

    function submitHabit() {
      const title = document.getElementById('task-title').value.trim();
      const errEl = document.getElementById('err-title');

      if (!title) {
        errEl.style.display = 'block';
        document.getElementById('task-title').focus();
        return;
      }
      errEl.style.display = 'none';

      const time = document.getElementById('task-time').value;
      const desc = document.getElementById('task-desc').value.trim();

      const task = {
        title,
        category: selectedCat,
        icon:     selectedIcon,
        sub:      time + (desc ? ' · ' + desc.substring(0, 40) : ''),
        status:   selectedStatus,
        scheduledTime: time,
        description: desc,
      };

      // TODO: Replace with API call: POST /api/tasks
      // const res = await fetch('/api/tasks', {
      //   method: 'POST',
      //   headers: { 'Content-Type':'application/json', 'Authorization': 'Bearer ' + Auth.token() },
      //   body: JSON.stringify(task)
      // });

      Tasks.add(task);
      showToast('Habit added! 🌱');
      setTimeout(() => window.location.href = 'dashboard.html', 700);
    }
  </script>
</body>
</html>
